name: ctt_mobile
description: App móvil CTT — supervisión offline-first de trabajadores en obras de construcción (Chile).
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado global
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Base de datos local offline-first
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # HTTP
  dio: ^5.7.0

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  firebase_crashlytics: ^4.1.3

  # Seguridad
  flutter_secure_storage: ^9.2.2

  # Sync en background (WorkManager)
  workmanager: ^0.5.2

  # Conectividad
  connectivity_plus: ^6.1.0

  # Imágenes / evidencias
  flutter_image_compress: ^2.3.0
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Navegación
  go_router: ^14.6.0

  # Modelos inmutables
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Internacionalización
  intl: ^0.19.0

  # Logging
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Generadores de código
  riverpod_generator: ^2.4.3
  drift_dev: ^2.21.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # Lints
  flutter_lints: ^5.0.0

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
